# CaseLift marketing site — static HTML (no build step).
# Explicit config so the deploy is deterministic regardless of dashboard
# settings or any leftover React build config: publish the repo root as-is.
[build]
  publish = "."
  command = ""

# Demo page is a self-contained static page.
[[redirects]]
  from = "/apply"
  to = "/apply.html"
  status = 200
